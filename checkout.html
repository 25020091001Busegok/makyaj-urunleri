<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odeme - Makyaj Kutusu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- SB Admin 2 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/css/sb-admin-2.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --rose: #d97c99;
      --rose-soft: #f8e9ef;
      --green: #1cc88a;
      --page-bg: #f4f5f9;
      --text: #45454f;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    .checkout-wrap {
      max-width: 1120px;
      margin: 28px auto;
      padding: 0 16px;
    }

    .checkout-card {
      border: 0;
      border-radius: 10px;
      box-shadow: 0 0.2rem 0.9rem rgba(58, 59, 69, 0.08);
      background: #fff;
    }

    .section-title {
      color: #4e73df;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .form-control {
      border-radius: 4px;
      min-height: 38px;
    }

    .btn-order {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      font-weight: 600;
    }

    .btn-order:hover {
      background: #18a574;
      border-color: #18a574;
      color: #fff;
    }

    .cart-mini {
      border: 1px solid #ebedf4;
      border-radius: 6px;
      min-height: 95px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9aa0b5;
      font-size: 0.9rem;
      background: #fbfcff;
    }

    .total-line {
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
    }

    .total-value {
      color: var(--green);
    }

    .badge-count {
      background: #4e73df;
      color: #fff;
      border-radius: 999px;
      font-size: 0.75rem;
      padding: 2px 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="checkout-wrap">
    <div class="mb-3">
      <a href="index.html" class="btn btn-sm btn-light border">
        <i class="fas fa-arrow-left me-2"></i>Alisverise Don
      </a>
    </div>

    <div class="row g-3">
      <div class="col-lg-8">
        <div class="checkout-card p-3 p-md-4">
          <div class="section-title"><i class="fas fa-truck me-2"></i>Teslimat Bilgileri</div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label small">Adiniz Soyadiniz</label>
              <input type="text" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label small">Sehir</label>
              <input type="text" class="form-control" />
            </div>
            <div class="col-12">
              <label class="form-label small">Adres</label>
              <textarea class="form-control" rows="2"></textarea>
            </div>
          </div>

          <hr class="my-4" />

          <div class="section-title"><i class="fas fa-credit-card me-2"></i>Odeme Bilgileri</div>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label small">Kart Uzerindeki Isim</label>
              <input type="text" class="form-control" />
            </div>
            <div class="col-12">
              <label class="form-label small">Kart Numarasi</label>
              <input type="text" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label small">Son Kullanma (AA/YY)</label>
              <input type="text" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label small">CVV</label>
              <input type="text" class="form-control" />
            </div>
          </div>

          <div class="mt-4">
            <button class="btn btn-order w-100">
              <i class="fas fa-check-circle me-2"></i>Siparisi Tamamla
            </button>
            <div class="text-center mt-2">
              <a href="index.html" class="small text-muted text-decoration-none">Alisverise Devam Et</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="checkout-card p-3">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <div class="section-title mb-0">Sepetim</div>
            <span id="checkout-cart-count" class="badge-count">0</span>
          </div>
          <div id="checkout-cart-status" class="cart-mini">Sepetiniz bos.</div>
          <div class="total-line">
            <span>Toplam:</span>
            <span id="checkout-cart-total" class="total-value">0 TL</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/startbootstrap-sb-admin-2@4.1.4/js/sb-admin-2.min.js"></script>
  <script>
    const checkoutCartCount = document.getElementById("checkout-cart-count");
    const checkoutCartStatus = document.getElementById("checkout-cart-status");
    const checkoutCartTotal = document.getElementById("checkout-cart-total");

    const cartTotal = Number(localStorage.getItem("cartTotal") || 0);
    const cartCount = Number(localStorage.getItem("cartCount") || 0);

    checkoutCartCount.textContent = String(cartCount);
    checkoutCartTotal.textContent = `${cartTotal} TL`;
    checkoutCartStatus.textContent =
      cartCount > 0 ? `${cartCount} urun sepete eklendi.` : "Sepetiniz bos.";
  </script>
</body>
</html>
